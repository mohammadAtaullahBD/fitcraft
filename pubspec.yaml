name: fitcraft
description: "FitCraft — 3D body scanning & AI-powered virtual try-on"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Models / Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utils
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Supabase
  supabase_flutter: ^2.9.0
  camera: ^0.12.0
  google_mlkit_pose_detection: ^0.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/fitcraft_icon_final.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B0F19"
  android_12:
    color: "#0B0F19"
